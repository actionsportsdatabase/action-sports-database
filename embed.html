<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASDB Profile Widget</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="embed.css" />
</head>
<body>

<div id="widget-root"></div>

<script src="data.js?v=20260411"></script>
<script>
(function() {
  'use strict';

  var BASE_URL = 'https://actionsportsdatabase.github.io/action-sports-database/';

  var SPORT_ICONS = {
    surf:'🏄', skate:'🛹', snow:'🏔', mtb:'🚵', moto:'🏍', bmx:'🚲',
    wakeboard:'🚤', wakeskate:'🚤', waterski:'🎿', bodyboard:'🌊',
    skimboard:'🌊', kitesurf:'🪁', windsurf:'🌬', kiteboard:'🪁',
    skydive:'🪂', base:'🪂', wingsuit:'🪂', cliffdive:'🤿',
    paraglide:'🪂', speedfly:'🪂', climb:'🧗', boulder:'🧗',
    parkour:'🏃', freerun:'🏃', inline:'⛸', breaking:'💃',
    film:'🎬', photo:'📸', music:'🎵', brand:'🏷', location:'📍',
    org:'🏛', athlete:'🏅', person:'👤', 'adaptive-surf':'♿',
  };

  var SPORT_LABELS = {
    surf:'Surf', skate:'Skate', snow:'Snow/Ski', mtb:'MTB',
    moto:'Moto/SX', bmx:'BMX', film:'Film', photo:'Photo',
    music:'Music', brand:'Brand', location:'Location', org:'Org',
    wakeboard:'Wakeboarding', wakeskate:'Wakeskating',
    waterski:'Water Ski', bodyboard:'Bodyboarding', skimboard:'Skimboarding',
    kitesurf:'Kitesurfing', kiteboard:'Kiteboarding', windsurf:'Windsurfing',
    skydive:'Skydiving', base:'BASE Jumping', wingsuit:'Wingsuit',
    cliffdive:'Cliff Diving', paraglide:'Paragliding', speedfly:'Speedflying',
    climb:'Climbing', boulder:'Bouldering', parkour:'Parkour',
    freerun:'Freerunning', inline:'Aggressive Inline', breaking:'Breaking',
    'adaptive-surf':'Adaptive Surf',
  };

  function sportLabel(s) {
    return SPORT_LABELS[s] || s;
  }

  function initials(name) {
    if (!name) return '?';
    var parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function getParam(name) {
    var params = new URLSearchParams(window.location.search);
    return params.get(name) || '';
  }

  function countConnections(node) {
    var conns = node.connections || [];
    return conns.length;
  }

  function renderWidget(node) {
    var sports   = node.sport || [];
    var sport1   = sports[0] || '';
    var icon     = SPORT_ICONS[sport1] || SPORT_ICONS[node.type] || '';
    var label    = sports.map(sportLabel).join(' / ') || node.type || '';
    var bioRaw   = (node.bio || '').replace(/<[^>]+>/g, '');
    var bio120   = bioRaw.slice(0, 120).trim() + (bioRaw.length > 120 ? '…' : '');
    var connCount = countConnections(node);
    var profileURL = BASE_URL + '#profile/' + node.id;
    var av       = initials(node.name);

    var root = document.getElementById('widget-root');
    root.innerHTML =
      '<div class="asdb-widget">' +
        '<div class="widget-header">' +
          '<div class="widget-avatar">' + escapeHTML(av) + '</div>' +
          '<div class="widget-meta">' +
            '<div class="widget-name">' + escapeHTML(node.name) + '</div>' +
            '<div class="widget-sport">' +
              (icon ? '<span class="widget-sport-icon">' + icon + '</span>' : '') +
              '<span class="widget-sport-label">' + escapeHTML(label) + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="widget-badge">AS<span>DB</span></div>' +
        '</div>' +
        (bio120 ? '<div class="widget-bio">' + escapeHTML(bio120) + '</div>' : '') +
        '<div class="widget-footer">' +
          '<div class="widget-connections">' +
            (connCount > 0
              ? '<strong>' + connCount + '</strong> connection' + (connCount !== 1 ? 's' : '')
              : 'Action Sports Database') +
          '</div>' +
          '<a class="widget-link" href="' + profileURL + '" target="_blank" rel="noopener">' +
            'View Full Profile &rarr;' +
          '</a>' +
        '</div>' +
      '</div>';
  }

  function renderError(msg) {
    var root = document.getElementById('widget-root');
    root.innerHTML =
      '<div class="widget-error">' +
        '<strong>Profile not found</strong>' +
        escapeHTML(msg || 'This profile does not exist in ASDB.') +
        ' <a href="' + BASE_URL + '" target="_blank" rel="noopener" style="color:#e8500a;">Visit ASDB</a>' +
      '</div>';
  }

  function escapeHTML(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function init() {
    var id = getParam('id');
    if (!id) {
      renderError('No profile ID specified.');
      return;
    }
    if (!window.ASDB || !window.ASDB.nodes) {
      renderError('Database not loaded.');
      return;
    }
    var node = window.ASDB.nodes[id];
    if (!node) {
      renderError('Profile "' + id + '" not found.');
      return;
    }
    renderWidget(node);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
